name: Build and deploy FastAPI app to Azure Web App - nodb

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ecom_noddb
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment package
        run: |
          cd ecom_noddb
          zip -r ../deploy.zip . -x "*.git*" -x "*.github*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact
        run: unzip deploy.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_50845B418A5F4A5685DEA5E0EE3AD459 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4D8495CA01034248BABE98BFFE5DE636 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D1221E75B2BD4B38A4E4E05C0DF8789E }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: nodb
          slot-name: Production
          package: deploy.zip

      - name: Set Azure Startup Command
        run: |
          az webapp config set \
            --name nodb \
            --resource-group YOUR_RESOURCE_GROUP \
            --startup-file "uvicorn ecom_noddb.app:app --host 0.0.0.0 --port 8000"